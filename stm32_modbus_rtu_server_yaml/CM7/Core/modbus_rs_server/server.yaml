schema_version: 1

device:
  name: "STM32 Modbus Server"
  unit_id: 1
  response_timeout_ms: 1000

hooks:
  on_write_coil: ~
  on_write_holding: ~

memory_map:
  coils:
    - name: led_yellow
      address: 0
      access: rw
      on_write: app_on_write_led_yellow
    - name: led_red
      address: 1
      access: wo
      on_write: app_on_write_led_red
    - name: led_green
      address: 2
      access: wo
      on_write: app_on_write_led_green

  discrete_inputs:
    - name: button_user
      address: 0
      access: ro

  holding_registers:
    - name: blink_delay
      address: 0
      access: rw
      on_write: app_on_write_blink_delay

